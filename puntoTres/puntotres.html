<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Punto 3: Red Neuronal Profunda</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; padding: 40px; background-color: #e9ecef; }
        .card { background: white; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        input { padding: 12px; margin: 10px; width: 220px; border: 2px solid #dee2e6; border-radius: 8px; }
        button { padding: 12px 24px; background-color: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        #resultado { margin-top: 25px; font-size: 1.4rem; color: #495057; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Predicción de Rendimiento (DNP)</h2>
        <p>Modelo con tensores definidos explícitamente</p>
        
        <input type="number" id="estudio" placeholder="Horas de estudio" step="0.1">
        <br>
        <input type="number" id="sueno" placeholder="Horas de sueño" step="0.1">
        <br>
        <button onclick="calcular()">Predecir Puntuación</button>
        
        <div id="resultado">Cargando cerebro artificial...</div>
    </div>

    <script>
        let model;
        async function cargarRed() {
            try {
                // Mantenemos la ruta relativa que nos funcionó
                model = await tf.loadLayersModel('./carpeta_web_punto3/model.json');
                document.getElementById("resultado").innerText = "Red Profunda Lista.";
            } catch (err) {
                document.getElementById("resultado").innerText = "Error al cargar el modelo JSON.";
                console.error(err);
            }
        }

        async function calcular() {
            if (!model) return;
            
            const h_estudio = parseFloat(document.getElementById("estudio").value);
            const h_sueno = parseFloat(document.getElementById("sueno").value);

            if (isNaN(h_estudio) || isNaN(h_sueno)) {
                alert("Ingresa ambos valores");
                return;
            }

            // APLICANDO LA CORRECCIÓN DEL PROFESOR:
            // Como son 2 variables de entrada, el shape es [1, 2] (1 fila, 2 columnas)
            const tensorEntrada = tf.tensor2d([h_estudio, h_sueno], [1, 2]);
            
            const pred = model.predict(tensorEntrada);
            const val = await pred.data();
            
            document.getElementById("resultado").innerText = 
                "Puntuación Estimada: " + Math.round(val[0]) + "/100";
            
            // Limpieza de memoria (buena práctica)
            tensorEntrada.dispose();
            pred.dispose();
        }
        
        cargarRed();
    </script>
</body>
</html>
