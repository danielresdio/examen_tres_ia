<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Punto 3: Red Neuronal Profunda</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; padding: 40px; background-color: #e9ecef; }
        .card { background: white; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        input { padding: 12px; margin: 10px; width: 220px; border: 1px solid #dee2e6; border-radius: 8px; }
        button { padding: 12px 24px; background-color: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; }
        #resultado { margin-top: 25px; font-size: 1.4rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Predicción de Rendimiento (DNP)</h2>
        <input type="number" id="estudio" placeholder="Horas de estudio">
        <br>
        <input type="number" id="sueno" placeholder="Horas de sueño">
        <br>
        <button onclick="calcular()">Predecir Puntuación</button>
        <div id="resultado">Cargando red neuronal...</div>
    </div>

    <script>
        let model;
        async function cargarRed() {
            try {
                // CORRECCIÓN: Asegúrate de que la carpeta en GitHub sea exactamente 'carpeta_web_punto3'
                model = await tf.loadLayersModel('./carpeta_web_punto3/model.json');
                document.getElementById("resultado").innerText = "Red Profunda Lista.";
            } catch (err) {
                document.getElementById("resultado").innerText = "Error al cargar el modelo JSON.";
                console.error(err);
            }
        }

        async function calcular() {
            if (!model) return;
            const h_estudio = parseFloat(document.getElementById("estudio").value);
            const h_sueno = parseFloat(document.getElementById("sueno").value);

            // CORRECCIÓN PROFESOR: Soluciona el error de InputLayer usando el shape [1, 2]
            const tensorEntrada = tf.tensor2d([h_estudio, h_sueno], [1, 2]);
            
            const pred = model.predict(tensorEntrada);
            const val = await pred.data();
            
            document.getElementById("resultado").innerText = 
                "Puntuación Estimada: " + Math.round(val[0]) + "/100";
            
            tensorEntrada.dispose();
            pred.dispose();
        }
        cargarRed();
    </script>
</body>
</html>
