<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monitor de Energía - Regresión Lineal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f9; text-align: center; }
        .card { background: white; max-width: 400px; margin: 50px auto; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input { padding: 12px; width: 80%; border: 1px solid #ddd; border-radius: 5px; margin-bottom: 20px; }
        button { padding: 12px 25px; background-color: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #resultado { margin-top: 25px; font-weight: bold; color: #e67e22; }
    </style>
</head>
<body>
<div class="card">
    <h2>Consumo del Servidor</h2>
    <p>Ingresa el % de carga de trabajo:</p>
    <input type="number" id="inputCarga" placeholder="Ejemplo: 75">
    <br>
    <button onclick="realizarPrediccion()">Predecir Consumo</button>
    <div id="resultado">Cargando modelo...</div>
</div>

<script>
    let modeloWeb = null;

    async function cargarModelo() {
        try {
            // CORRECCIÓN: Se usa loadLayersModel y la ruta exacta de tu carpeta en GitHub
            modeloWeb = await tf.loadLayersModel('./carpeta_web/model.json');
            document.getElementById("resultado").innerText = "Modelo listo.";
        } catch (error) {
            document.getElementById("resultado").innerText = "Error al cargar el modelo.";
            console.error(error);
        }
    }

    async function realizarPrediccion() {
        if (modeloWeb == null) return;
        const carga = document.getElementById("inputCarga").value;
        if (carga === "") return;

        const valor = parseFloat(carga);
        // CORRECCIÓN PROFESOR: Tensor explícito [1, 1]
        const tensorEntrada = tf.tensor2d([valor], [1, 1]);

        const prediccion = modeloWeb.predict(tensorEntrada);
        const resultado = await prediccion.data();
        
        document.getElementById("resultado").innerText = 
            "Predicción: " + resultado[0].toFixed(2) + " Watts";
        
        tensorEntrada.dispose();
        prediccion.dispose();
    }
    cargarModelo();
</script>
</body>
</html>
