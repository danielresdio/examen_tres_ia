<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Punto 2: Clasificación de Microchips</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background-color: #f4f4f9; }
        .container { background: white; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        input { padding: 10px; margin: 10px; width: 200px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #resultado { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Clasificador de Microchips</h2>
        <input type="number" id="test1" placeholder="Test 1" step="0.01">
        <br>
        <input type="number" id="test2" placeholder="Test 2" step="0.01">
        <br>
        <button onclick="predecir()">Clasificar</button>
        <div id="resultado">Cargando modelo...</div>
    </div>

    <script>
        let modelo;
        async function cargarModelo() {
            try {
                modelo = await tf.loadLayersModel('./carpeta_web_punto2/model.json');
                document.getElementById("resultado").innerText = "Modelo listo.";
            } catch (error) {
                document.getElementById("resultado").innerText = "Error de carga.";
            }
        }

        async function predecir() {
            if (!modelo) return;
            const t1 = parseFloat(document.getElementById("test1").value);
            const t2 = parseFloat(document.getElementById("test2").value);

            // CORRECCIÓN PROFESOR: Tensor explícito [1, 2]
            const tensorEntrada = tf.tensor2d([t1, t2], [1, 2]);
            const prediccion = modelo.predict(tensorEntrada);
            const data = await prediccion.data();
            
            const respuesta = data[0] > 0.5 ? "APTO ✅" : "RECHAZADO ❌";
            document.getElementById("resultado").innerText = `Resultado: ${respuesta}`;
            
            tensorEntrada.dispose();
            prediccion.dispose();
        }
        cargarModelo();
    </script>
</body>
</html>
